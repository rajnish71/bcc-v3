  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

le=\"font-size:12px;font-weight:500;\">2 selected<\u002Fspan>\n            <div style=\"display:flex;gap:14px;font-size:13px;\"><span>★<\u002Fspan><span>◑<\u002Fspan><span style=\"color:#D98A7A;\">⌫<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n            <div style=\"background:#FFFFFF;box-shadow:0 0 0 2px #C9A961 inset;padding:7px;position:relative;\"><span style=\"position:absolute;top:13px;left:13px;width:18px;height:18px;border-radius:999px;background:linear-gradient(135deg,#C9A961,#A8843C);color:#FFFFFF;font-size:9px;display:flex;align-items:center;justify-content:center;\">✓<\u002Fspan><div style=\"aspect-ratio:4/5;background:#1A1816;\"><\u002Fdiv><div style=\"font-size:10px;font-weight:600;margin-top:6px;\">Monsoon Light<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFFFFF;box-shadow:0 0 0 2px #C9A961 inset;padding:7px;position:relative;\"><span style=\"position:absolute;top:13px;left:13px;width:18px;height:18px;border-radius:999px;background:linear-gradient(135deg,#C9A961,#A8843C);color:#FFFFFF;font-size:9px;display:flex;align-items:center;justify-content:center;\">✓<\u002Fspan><div style=\"aspect-ratio:3/2;background:#1E1C1A;\"><\u002Fdiv><div style=\"font-size:10px;font-weight:600;margin-top:6px;\">Old City Dusk<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E7E1D6;padding:7px;\"><div style=\"aspect-ratio:1/1;background:#1C1A18;\"><\u002Fdiv><div style=\"font-size:10px;font-weight:600;margin-top:6px;\">Talab Chowk<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#FFFFFF;border:1px solid #E7E1D6;padding:7px;\"><div style=\"aspect-ratio:5/4;background:#211F1C;\"><\u002Fdiv><div style=\"font-size:10px;font-weight:600;margin-top:6px;\">Upper Lake<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- HubMobileBar -->\n        <div style=\"position:absolute;left:0;right:0;bottom:0;height:84px;background:rgba(255,255,255,0.96);border-top:1px solid #E7E1D6;display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;align-items:center;padding-bottom:14px;\">\n          <div style=\"text-align:center;\"><div style=\"font-size:16px;color:#8B8378;\">⌂<\u002Fdiv><div style=\"font-size:9px;font-weight:600;color:#8B8378;margin-top:4px;\">Home<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;\"><div style=\"font-size:16px;color:#141210;\">⊡<\u002Fdiv><div style=\"font-size:9px;font-weight:600;color:#141210;margin-top:4px;\">Portfolio<\u002Fdiv><div style=\"width:14px;height:2px;background:#C9A961;margin:3px auto 0 auto;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;position:relative;\"><div style=\"width:52px;height:52px;margin:-32px auto 0 auto;border-radius:999px;background:linear-gradient(135deg,#C9A961,#A8843C);color:#FFFFFF;font-size:20px;display:flex;align-items:center;justify-content:center;\">⬆<\u002Fdiv><div style=\"font-size:9px;font-weight:600;color:#8B8378;margin-top:4px;\">Upload<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;\"><div style=\"font-size:16px;color:#8B8378;\">▿<\u002Fdiv><div style=\"font-size:9px;font-weight:600;color:#8B8378;margin-top:4px;\">Club<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;\"><div style=\"font-size:16px;color:#8B8378;\">⊙<\u002Fdiv><div style=\"font-size:9px;font-weight:600;color:#8B8378;margin-top:4px;\">More<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:13px;color:#57514B;line-height:1.65;max-width:293px;margin-top:12px;\">≤640px: 2-col wall. Long-press a mat to enter selection (haptic + gold ring); tapping thereafter toggles selection. SelectionBar docks above the wall, below the header. Inspector opens full-screen on tap of a single mat.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════════════════════════════════════════════════\n     SECTION 07 — SPEC PANELS\n══════════════════════════════════════════════════════ -->\n<section style=\"max-width:1140px;margin:0 auto;padding:96px 48px 0;\" data-screen-label=\"07 Spec Panels\">\n  <div style=\"display:flex;align-items:baseline;gap:20px;margin-bottom:8px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#A8843C;\">07<\u002Fspan>\n    <h2 style=\"font-family:'Outfit',sans-serif;font-size:40px;font-weight:700;letter-spacing:-0.025em;\">Specification<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:24px;margin-top:36px;\">\n\n    <div style=\"background:#FFFFFF;border:1px solid #E7E1D6;padding:28px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#A8843C;margin-bottom:16px;\">SECTION ANNOTATIONS<\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.8;color:#57514B;display:flex;flex-direction:column;gap:12px;\">\n        <div><strong style=\"color:#141210;\">① Page Header<\u002Fstrong> — title, photo count, selected count, quiet public-portfolio link. No gold CTA here — the CTA lives only in the empty state.<\u002Fdiv>\n        <div><strong style=\"color:#141210;\">② Toolbar<\u002Fstrong> — DirectoryToolbar vocabulary: search, member's-own-genres chips, Status, Sort, Grid/List toggle.<\u002Fdiv>\n        <div><strong style=\"color:#141210;\">③ Portfolio Wall<\u002Fstrong> — MattedThumb cards at native aspect ratio. Featured flag top-left, status chip on the label row, quiet hover controls, selection ring.<\u002Fdiv>\n        <div><strong style=\"color:#141210;\">④ SelectionBar<\u002Fstrong> — slides in above the wall on first selection. Batch ops: Feature, Visibility, Move, Delete. Delete is the only destructive action.<\u002Fdiv>\n        <div><strong style=\"color:#141210;\">⑤ Inspector Panel<\u002Fstrong> — right-edge contextual overlay on desktop, full-screen sheet on mobile. Never a permanent third column.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#FFFFFF;border:1px solid #E7E1D6;padding:28px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#A8843C;margin-bottom:16px;\">INFORMATION HIERARCHY<\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.9;color:#57514B;\">\n        1. Photography (the wall)<br>\n        2. Selection state (gold ring + check)<br>\n        3. Toolbar (quiet, always available)<br>\n        4. Page Header metadata<br>\n        5. SelectionBar (appears only when needed)<br>\n        6. Inspector fields (opened intentionally)<br>\n        7. Left rail (wayfinding)<br>\n        8. Site header (public exit)\n      <\u002Fdiv>\n      <div style=\"margin-top:20px;padding-top:16px;border-top:1px solid #F0EBE0;font-size:12px;color:#8B8378;line-height:1.6;\">Editing tools stay visually quiet until a mat is hovered or selected — this is the curation room, not an admin dashboard.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#FFFFFF;border:1px solid #E7E1D6;padding:28px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#A8843C;margin-bottom:16px;\">SELECTION BEHAVIOUR<\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.9;color:#57514B;\">\n        <strong style=\"color:#141210;\">Desktop/tablet<\u002Fstrong> — click a mat to toggle selection; SelectionBar appears on first selection, disappears at zero.<br><br>\n        <strong style=\"color:#141210;\">Mobile<\u002Fstrong> — long-press enters selection mode (haptic feedback + gold ring); subsequent taps toggle. Tapping empty space exits selection mode.<br><br>\n        <strong style=\"color:#141210;\">Delete<\u002Fstrong> — always requires a confirmation step; the only destructive batch action.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#FFFFFF;border:1px solid #E7E1D6;padding:28px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#A8843C;margin-bottom:16px;\">RESPONSIVE + CONDITIONAL<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;line-height:2.0;color:#57514B;margin-bottom:16px;\">\n        ≥1200    4-col wall · inspector overlay<br>\n        641–1199 3-col wall · inspector sheet<br>\n        ≤640     2-col wall · long-press · full-screen inspector\n      <\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.7;color:#57514B;display:flex;flex-direction:column;gap:10px;\">\n        <div><strong style=\"color:#141210;\">Conditional rendering<\u002Fstrong><br>SelectionBar: hidden when selection count = 0<br>Toolbar/SelectionBar: hidden entirely on the empty state<br>Featured flag: renders only when photo.featured = true<\u002Fdiv>\n        <div><strong style=\"color:#141210;\">Empty state<\u002Fstrong><br>Single gold CTA — Upload Photograph — replaces the whole wall + toolbar.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div style=\"background:#FAF8F4;border:1px solid #E7E1D6;padding:32px;margin-top:24px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;color:#A8843C;margin-bottom:20px;\">COMPONENT TREE<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;line-height:2.0;color:#57514B;\">\n          AuthLayout (role ≥ member)<br>\n          ├ SiteHeader {session, member}<br>\n          └ HubShell<br>\n          &nbsp;&nbsp;├ HubRail {hubNav[], activeRoute:\"portfolio\"}<br>\n          &nbsp;&nbsp;├ HubMain<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;├ PageHeader {photoCount, selectedCount}<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;├ DirectoryToolbar {search, genres[], status, sort, view}<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;├ SelectionBar? {selection[]}<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;├ PortfolioWall {photos[], view}<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;│&nbsp;&nbsp;└ MattedThumb ×n {photo, selected, featured}<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;├ InspectorPanel? {photo, prev/next}<br>\n          &nbsp;&nbsp;│&nbsp;&nbsp;└ EmptyState? {ctaOnly:true}<br>\n          &nbsp;&nbsp;└ HubMobileBar [≤640px]<br>\n          SiteFooter\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;line-height:1.75;color:#57514B;\">\n          <div style=\"margin-bottom:14px;\"><strong style=\"color:#141210;\">? = conditional<\u002Fstrong><br>SelectionBar renders only when {selection.length &gt; 0}. InspectorPanel renders only when a single photo is opened. EmptyState renders only when {photos.length === 0}, replacing Toolbar + Wall entirely.<\u002Fdiv>\n          <div style=\"margin-bottom:14px;\"><strong style=\"color:#141210;\">Data contracts<\u002Fstrong><br>PageHeader reads {member.photos.length, selection.length, member.publicProfileUrl}. PortfolioWall reads {member.photos[]} filtered by toolbar state. InspectorPanel reads {photo.caption, description, exhibitionLabel, exif, visibility, focalPoint}.<\u002Fdiv>\n          <div><strong style=\"color:#141210;\">Auth gate<\u002Fstrong><br>Inherits AuthLayout from V6 09 — role ≥ \"member\" required. Unauthenticated redirect → /auth/signin.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════════════════════════════════════════════════\n     FROZEN DOCUMENT FOOTER\n══════════════════════════════════════════════════════ -->\n<footer style=\"max-width:1140px;margin:96px auto 0 auto;padding:40px 48px;border-top:2px solid #141210;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;\">\n  <div>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#A8843C;letter-spacing:0.14em;margin-bottom:6px;\">BCC UNIFIED PLATFORM V6 · STEP 7 · JULY 2026<\u002Fdiv>\n    <div style=\"font-family:'Outfit',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.015em;\">V6 10 Members Hub Portfolio<\u002Fdiv>\n    <div style=\"font-size:13px;color:#8B8378;margin-top:4px;\">Migrates 04 BCC Hub Visual Master's Portfolio Manager onto the frozen V6 09 Hub shell. Design reference only.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;background:#141210;color:#C9A961;\">STEP 7 COMPLETE<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;background:#3E5A48;color:#FFFFFF;\">SHELL UNCHANGED FROM V6 09<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;background:#F4F0E8;border:1px solid #D8D2C6;color:#57514B;\">INSPECTOR IS NOT A 3RD COLUMN<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
